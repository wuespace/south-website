# Promote an already-built image to a stable release.
#
# A version tag (vX.X) points at a commit that `main` already built and pushed
# as `:<sha>` via publish_container.yml. Promoting is therefore just a registry-side
# re-tag: skopeo copies the existing manifest (layers are deduped by digest),
# so this finishes in seconds and never rebuilds. The release becomes reachable
# via `:vX.X` (pin a specific version) and `:stable` (newest stable release).
name: Promote release image

on:
  # Runs on version tags.
  push:
    tags: ['v*.*']

# Allow reading the repo and pushing packages (GHCR) with GITHUB_TOKEN.
permissions:
  contents: read
  packages: write

# Serialize with main publishes so `:stable`/`:latest` are never written at the
# same time, but keep a separate group so a release never cancels a build.
concurrency:
  group: 'container'
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Install skopeo
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GITHUB_SHA is the commit the tag points at, which matches the `:<sha>`
      # tag publish_container.yml pushed when that commit landed on main. Fails fast
      # if the tagged commit was never built on main (no `:<sha>` to promote).
      - name: Promote image to stable
        shell: bash
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          VERSION="${GITHUB_REF#refs/tags/}"
          skopeo copy --insecure-policy \
            "docker://${IMAGE}:${GITHUB_SHA}" "docker://${IMAGE}:${VERSION}"
          skopeo copy --insecure-policy \
            "docker://${IMAGE}:${GITHUB_SHA}" "docker://${IMAGE}:stable"
