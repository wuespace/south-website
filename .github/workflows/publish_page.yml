# Build the static site with Nix and publish it to GitHub Pages.
#
# Runs only when a new stable version is available: it is chained to the
# "Promote release image" workflow (promote_release.yml) via workflow_run and
# skips unless that run succeeded. It builds the exact commit the promoted
# tag points at, so Pages always serves the same content as the `:stable`
# container image.
name: Publish page

on:
  # Runs on version tags.
  push:
    tags: ['v*.*']

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Allow reading the repo and deploying to Pages with GITHUB_TOKEN.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and the latest queued.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          # The commit the promoted tag points at; falls back to the default
          # branch head on manual dispatch.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install Nix
        uses: NixOS/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            # bun2nix cache
            extra-substituters = https://nix-community.cachix.org
            extra-trusted-public-keys = nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      # packages.default is the prerendered site (see default.nix).
      - name: Build site
        shell: bash
        run: nix build --print-build-logs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # The upload tars with --dereference, so the `result` store symlink works.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: result

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
